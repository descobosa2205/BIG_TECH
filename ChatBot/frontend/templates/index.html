<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Bedrock AgentCore</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        header .badge { font-size: 0.75rem; background: #059669; padding: 2px 8px; border-radius: 9999px; }
        #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

        .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #3b82f6; color: white; border-bottom-right-radius: 4px; white-space: pre-wrap; }
        .msg.bot { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
        .msg.error { background: #991b1b; border-color: #dc2626; }
        .msg .rag-badge { display: inline-block; font-size: 0.65rem; background: #7c3aed; padding: 1px 6px; border-radius: 4px; margin-bottom: 8px; }

        /* Markdown rendered styles */
        .md-content p { margin: 0 0 8px 0; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content strong { color: #f1f5f9; font-weight: 600; }
        .md-content em { color: #cbd5e1; }
        .md-content code { background: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-family: 'SF Mono', Monaco, Consolas, monospace; }
        .md-content pre { background: #0f172a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
        .md-content pre code { background: none; padding: 0; font-size: 0.85em; }
        .md-content ul, .md-content ol { margin: 6px 0; padding-left: 20px; }
        .md-content li { margin: 3px 0; }
        .md-content h1, .md-content h2, .md-content h3, .md-content h4 { font-size: 1em; font-weight: 600; margin: 12px 0 4px 0; color: #f1f5f9; }
        .md-content h1 { font-size: 1.1em; }
        .md-content blockquote { border-left: 3px solid #475569; padding-left: 12px; margin: 6px 0; color: #94a3b8; }
        .md-content a { color: #60a5fa; text-decoration: underline; }
        .md-content hr { border: none; border-top: 1px solid #334155; margin: 10px 0; }
        .md-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .md-content th, .md-content td { border: 1px solid #334155; padding: 6px 10px; text-align: left; }
        .md-content th { background: #0f172a; font-weight: 600; }

        .typing { align-self: flex-start; padding: 12px 16px; }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

        #input-area { background: #1e293b; padding: 16px 24px; border-top: 1px solid #334155; display: flex; gap: 12px; }
        #input-area input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; outline: none; }
        #input-area input:focus { border-color: #3b82f6; }
        #input-area button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 500; }
        #input-area button:hover { background: #2563eb; }
        #input-area button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Chatbot Bedrock AgentCore</h1>
        <span class="badge">Strands Agents + RAG</span>
    </header>
    <div id="chat">
        <div class="msg bot"><div class="md-content">¡Hola! Soy un chatbot con Bedrock AgentCore y Strands Agents. Puedo responder preguntas usando RAG con tu Knowledge Base. ¿En qué puedo ayudarte?</div></div>
    </div>
    <div id="input-area">
        <input type="text" id="msg" placeholder="Escribe tu mensaje..." autocomplete="off">
        <button id="send" onclick="sendMessage()">Enviar</button>
    </div>
    <script>
        marked.setOptions({ breaks: true, gfm: true });

        const chat = document.getElementById('chat');
        const input = document.getElementById('msg');
        const btn = document.getElementById('send');

        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) sendMessage(); });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            btn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                typing.remove();
                if (data.error) {
                    addMsg('Error: ' + data.error, 'bot error');
                } else {
                    addMsg(data.response, 'bot', data.has_context);
                }
            } catch (err) {
                typing.remove();
                addMsg('Error de conexión: ' + err.message, 'bot error');
            }
            btn.disabled = false;
            input.focus();
        }

        function addMsg(text, type, hasContext) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;

            if (type === 'user') {
                div.textContent = text;
            } else {
                let html = '';
                if (hasContext) html += '<div class="rag-badge">📚 RAG</div>';
                html += '<div class="md-content">' + marked.parse(text) + '</div>';
                div.innerHTML = html;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
